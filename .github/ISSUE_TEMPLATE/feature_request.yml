name: Feature request
description: Suggest an idea or improvement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please check existing issues and discussions first.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is missing or painful today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like LAM to behave? APIs, CLI flags, or behavior changes welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered, or workarounds you use today.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - CLI / GeoTIFF
        - HTTP server
        - Python API
        - Docker / deployment
        - Docs only
        - Unsure
    validations:
      required: true
