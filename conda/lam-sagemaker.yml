# LAM: GDAL + ML stack from conda-forge (aligned OpenMP / BLAS).
#
# PyTorch, NumPy, and TorchVision are installed here—not via pip—so they share one
# OpenMP runtime. That avoids macOS abort: "Initializing libomp.dylib, but found
# libomp.dylib already initialized" when PyPI PyTorch wheels mix with conda's NumPy.
#
# After creating/updating the env:
#   conda activate lam_sagemaker
#   pip install -e . --no-deps
#
# Linux + NVIDIA GPU (e.g. SageMaker): run scripts/setup_sagemaker_notebook.sh with
#   LAM_PYTORCH_CUDA=12.4
# so the script replaces this conda-forge PyTorch with pip CUDA wheels (cu124). macOS: omit
# that var and keep conda-only torch to avoid libomp clashes with pip wheels.

name: lam_sagemaker
channels:
  - conda-forge
dependencies:
  - python=3.13
  - pip
  # Core numerics / torch (keep off pip for a single libomp on macOS).
  - numpy>=1.26
  - pytorch>=2.2
  - torchvision>=0.17
  # GDAL stack (PROJ must match libgdal-core: gdal 3.12.x needs proj >=9.7.1)
  - gdal=3.12.0
  - proj>=9.7.1,<9.8
  - openjpeg=2.5.4
  - libgdal-jp2openjpeg
  - libgdal-hdf4
  - libgdal-hdf5
  - libgdal-netcdf
  - libgdal-grib
  # Geo libraries (use conda's GDAL; avoids pip rasterio vs system GDAL mismatch).
  # rasterio 1.4.4+ aligns with proj 9.7.1+ required by libgdal-core 3.12.
  - rasterio>=1.4.4
  - shapely>=2.0.0
  - pyproj>=3.5.0
  - affine
  - opencv>=4.8.0
  - psutil>=5.9.0
  - pycocotools>=2.0.6
  - matplotlib>=3.7
  # Remaining LAM / server deps (no torch/numpy/torchvision/rasterio here).
  - pip:
      - timm>=1.0.17
      - tqdm
      - ftfy==6.1.1
      - regex
      - iopath>=0.1.10
      - typing_extensions
      - huggingface_hub
      - einops
      - Pillow
      - flask
      - waitress
      - json-logging
      - orjson>=3.9
      # lam.visualization_utils (upstream sam3 parity)
      - pandas>=2.0.0
      - scikit-learn>=1.3.0
      - scikit-image>=0.22.0
